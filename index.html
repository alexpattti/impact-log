<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impel // Impact Log</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F3EF;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --border-strong: #C9C3BA;
    --accent: #6D00D2;
    --accent-dim: #9B3EE0;
    --accent-light: #F0E6FA;
    --text: #1A1714;
    --text-muted: #5C5752;
    --text-dim: #9C9790;
    --green: #1A7A45;
    --green-bg: #EAF5EF;
    --amber: #9A6200;
    --amber-bg: #FDF3DC;
    --red: #B83030;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    padding: 2rem 1.5rem 6rem;
    max-width: 1500px;
    margin: 0 auto;
  }
  .header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 2rem;
    margin-bottom: 2.5rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 900;
    line-height: 1.1;
    color: var(--text);
  }
  .totals-bar {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }
  .total-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1rem 1.25rem;
    width: 180px;
  }
  .total-card .tl {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
  }
  .total-card .tv {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
  }
  #entries-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    border: 1px dashed var(--border);
    background: var(--surface);
  }
  .entry {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.5rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .entry:hover {
    border-color: var(--accent-dim);
    box-shadow: 0 0 0 3px var(--accent-light);
  }
  .entry-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.25rem;
  }
  .entry-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--accent);
  }
  .entry-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 0.25rem;
  }
  .status-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.2rem 0.6rem;
    flex-shrink: 0;
    margin-left: 1rem;
    margin-top: 0.2rem;
  }
  .status-complete { border: 1px solid var(--green); color: var(--green); background: var(--green-bg); }
  .status-wip { border: 1px solid var(--amber); color: var(--amber); background: var(--amber-bg); }
  .field { margin-bottom: 1rem; }
  .field:last-of-type { margin-bottom: 0; }
  .field-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent-dim);
    margin-bottom: 0.35rem;
  }
  .field-val {
    font-size: 0.88rem;
    color: var(--text-muted);
    line-height: 1.65;
  }
  .field-val.highlight {
    color: var(--text);
    font-weight: 400;
  }
  .footer {
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    display: flex;
    justify-content: space-between;
  }
  .footer-right {
    display: flex;
    gap: 1rem;
    align-items: center;
  }
  .footer-link {
    color: var(--text-dim);
    text-decoration: underline;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
  }
  .footer-link:hover { color: var(--accent); }
  @media (max-width: 600px) {
    #entries-list { grid-template-columns: 1fr; }
    .totals-bar { flex-direction: column; align-items: center; }
    .header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    .footer { flex-direction: column; gap: 0.5rem; }
  }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="label">Alex Patti // Impel AI Sales Ops Internship</div>
    <h1>Impact Log</h1>
  </div>
</div>
<div class="totals-bar">
  <div class="total-card">
    <div class="tl">Projects logged</div>
    <div class="tv" id="stat-projects">0</div>
  </div>
  <div class="total-card">
    <div class="tl">Records touched</div>
    <div class="tv" id="stat-records">0</div>
  </div>
  <div class="total-card">
    <div class="tl">Completed</div>
    <div class="tv" id="stat-done">0</div>
  </div>
</div>
<div id="entries-list">
  <div class="empty-state">Loading…</div>
</div>
<div class="footer">
  <span>ALEX PATTI // IMPEL AI</span>
  <div class="footer-right">
    <a class="footer-link" href="deliverables.html">Leadership deliverables</a>
    <span id="footer-date"></span>
  </div>
</div>
<script>
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function render(entries) {
  const list = document.getElementById('entries-list');
  list.innerHTML = '';
  if (entries.length === 0) {
    list.innerHTML = '<div class="empty-state">No entries yet</div>';
  }
  let doneCount = 0;
  let totalRecords = 0;
  entries.forEach(e => {
    if (e.status === 'complete') doneCount++;
    totalRecords += (typeof e.records === 'number' ? e.records : 0);
    const div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = `
      <div class="entry-head">
        <div>
          <div class="entry-name">${escHtml(e.name)}</div>
          <div class="entry-date">${escHtml(e.date || '')}</div>
        </div>
        <span class="status-badge ${e.status === 'complete' ? 'status-complete' : 'status-wip'}">${escHtml(e.status)}</span>
      </div>
      <div class="field">
        <div class="field-label">Volume</div>
        <div class="field-val highlight">${escHtml(e.volume)}</div>
      </div>
      <div class="field">
        <div class="field-label">Root cause</div>
        <div class="field-val">${escHtml(e.cause)}</div>
      </div>
      <div class="field">
        <div class="field-label">Downstream consequence</div>
        <div class="field-val">${escHtml(e.consequence)}</div>
      </div>
    `;
    list.appendChild(div);
  });
  document.getElementById('stat-projects').textContent = entries.length;
  document.getElementById('stat-done').textContent = doneCount;
  document.getElementById('stat-records').textContent = totalRecords > 0 ? totalRecords.toLocaleString() : '0';
  document.getElementById('footer-date').textContent = new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();
}
fetch('data.json')
  .then(res => res.json())
  .then(data => render(data.projects || []))
  .catch(err => {
    document.getElementById('entries-list').innerHTML = '<div class="empty-state">Could not load data.json</div>';
    console.error(err);
  });
</script>
</body>
</html>
