<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impel // Misc Achievments</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,72,400;0,72,500;0,72,600;1,72,400;1,72,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EDEAE3;
    --paper: #FBF9F5;
    --ink: #1C1A17;
    --ink-soft: #5A564E;
    --rule: #D8D2C6;
    --accent: #6D00D2;
    --stamp: #B83030;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    background: var(--bg);
    background-image:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 1px, transparent 1px, transparent 3px);
    color: var(--ink);
    font-family: 'Newsreader', serif;
    font-weight: 400;
    padding: 4rem 1.5rem 5rem;
  }
 
  .sheet {
    max-width: 760px;
    margin: 0 auto;
    background: var(--paper);
    border: 1px solid var(--rule);
    box-shadow: 0 1px 0 var(--rule), 0 30px 60px -30px rgba(0,0,0,0.25);
    padding: 3.5rem 3.5rem 0;
    position: relative;
  }
 
  /* Masthead */
  .masthead {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 3px solid var(--ink);
    padding-bottom: 1rem;
    margin-bottom: 0.5rem;
  }
  .masthead h1 {
    font-size: clamp(2rem, 6vw, 2.6rem);
    font-weight: 600;
    font-style: italic;
    letter-spacing: -0.01em;
  }
  .back-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-decoration: none;
    border-bottom: 1px solid var(--ink-soft);
    padding-bottom: 2px;
    white-space: nowrap;
    margin-left: 2rem;
  }
  .back-link:hover { color: var(--accent); border-color: var(--accent); }
 
  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.75rem;
  }
 
  /* Tally line */
  .tally {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    padding-bottom: 2.25rem;
    margin-bottom: 2.25rem;
    border-bottom: 1px solid var(--rule);
  }
  .tally .num {
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 1.4rem;
    color: var(--accent);
  }
 
  /* Entries */
  #entries-list { display: flex; flex-direction: column; }
 
  .entry {
    position: relative;
    padding-bottom: 2.75rem;
    margin-bottom: 2.75rem;
    border-bottom: 1px solid var(--rule);
  }
  .entry:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0.5rem; }
 
  .entry-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .entry-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .entry-name {
    font-size: 1.5rem;
    font-weight: 500;
    line-height: 1.25;
    color: var(--ink);
  }
  .entry-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-top: 0.6rem;
  }
 
  .stamp {
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--stamp);
    border: 1.5px solid var(--stamp);
    padding: 0.5rem 0.7rem;
    text-align: right;
    line-height: 1.5;
    transform: rotate(2deg);
    max-width: 190px;
    white-space: normal;
  }
  .stamp::before {
    content: 'ROUTE TO';
    display: block;
    font-weight: 700;
    letter-spacing: 0.12em;
    margin-bottom: 0.15rem;
    opacity: 0.7;
  }
 
  .field { margin-bottom: 1.5rem; }
  .field:last-child { margin-bottom: 0; }
  .field-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.6rem;
  }
  .field-val {
    font-size: 1.02rem;
    line-height: 1.7;
    color: var(--ink-soft);
  }
  .field-val.highlight {
    font-size: 1.12rem;
    color: var(--ink);
    padding-left: 1rem;
    border-left: 3px solid var(--accent);
  }
 
  .empty-state {
    text-align: center;
    padding: 3rem 0 3.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
 
  /* Footer */
  .footer {
    border-top: 3px solid var(--ink);
    padding: 1.25rem 0 1.75rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    display: flex;
    justify-content: space-between;
    text-transform: uppercase;
  }
  .footer span:first-child { color: var(--ink); font-weight: 500; }
 
  @media (max-width: 600px) {
    body { padding: 2rem 0.75rem 3rem; }
    .sheet { padding: 2rem 1.25rem 0; }
    .masthead { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
    .back-link { margin-left: 0; }
    .entry-top { flex-direction: column; }
    .stamp { transform: none; max-width: none; text-align: left; }
  }
</style>
</head>
<body>
<div class="sheet">
  <div class="masthead">
    <h1>Misc Achievments</h1>
    <a class="back-link" href="index.html">Back to impact log</a>
  </div>
  <div class="label">Alex Patti // Impel AI Sales Ops Internship</div>
 
  <div class="tally">
    <span>Deliverables logged —</span>
    <span class="num" id="stat-count">0</span>
  </div>
 
  <div id="entries-list">
    <div class="empty-state">Loading…</div>
  </div>
 
  <div class="footer">
    <span>ALEX PATTI // IMPEL AI</span>
    <div class="footer-right">
      <span id="footer-date"></span>
    </div>
  </div>
</div>
<script>
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function render(entries) {
  const list = document.getElementById('entries-list');
  list.innerHTML = '';
  if (entries.length === 0) {
    list.innerHTML = '<div class="empty-state">No deliverables logged yet</div>';
  }
  entries.forEach(e => {
    const div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = `
      <div class="entry-top">
        <div>
          <div class="entry-id">${escHtml(e.id || '')}</div>
          <div class="entry-name">${escHtml(e.name)}</div>
          <div class="entry-date">${escHtml(e.date || '')}</div>
        </div>
        <div class="stamp">${escHtml(e.audience || '')}</div>
      </div>
      <div class="field">
        <div class="field-label">Bottom line</div>
        <div class="field-val highlight">${escHtml(e.summary)}</div>
      </div>
      <div class="field">
        <div class="field-label">Context</div>
        <div class="field-val">${escHtml(e.context)}</div>
      </div>
    `;
    list.appendChild(div);
  });
  document.getElementById('stat-count').textContent = entries.length;
  document.getElementById('footer-date').textContent = new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();
}
fetch('data.json')
  .then(res => res.json())
  .then(data => render(data.deliverables || []))
  .catch(err => {
    document.getElementById('entries-list').innerHTML = '<div class="empty-state">Could not load data.json</div>';
    console.error(err);
  });
</script>
</body>
</html>
